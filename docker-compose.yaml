services:
  nginx:
    image: nginx:alpine
    container_name: acervo_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html/src
      - ./public:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - acervo_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: acervo_php
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=${APP_ENV:-development}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - acervo_network

  mysql:
    image: mysql:8.0
    container_name: acervo_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-acervo_rct}
      MYSQL_USER: ${DB_USER:-acervo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-acervo123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acervo_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: acervo_phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-acervo}
      PMA_PASSWORD: ${DB_PASSWORD:-acervo123}
    depends_on:
      - mysql
    networks:
      - acervo_network

volumes:
  mysql_data:

networks:
  acervo_network:
    driver: bridge